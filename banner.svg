<svg viewBox="0 0 860 260" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="pitch" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#07220F"/>
      <stop offset="100%" stop-color="#0F3A1D"/>
    </linearGradient>
    <radialGradient id="spotlight" cx="50%" cy="30%" r="70%">
      <stop offset="0%" stop-color="#FFD70033"/>
      <stop offset="100%" stop-color="#FFD70000"/>
    </radialGradient>
  </defs>

  <rect width="860" height="260" fill="url(#pitch)"/>
  <rect width="860" height="260" fill="url(#spotlight)"/>

  <!-- pitch lines -->
  <circle cx="430" cy="130" r="55" fill="none" stroke="#ffffff22" stroke-width="2"/>
  <line x1="430" y1="0" x2="430" y2="260" stroke="#ffffff18" stroke-width="2"/>
  <rect x="20" y="60" width="90" height="140" fill="none" stroke="#ffffff18" stroke-width="2"/>
  <rect x="750" y="60" width="90" height="140" fill="none" stroke="#ffffff18" stroke-width="2"/>

  <!-- generic player silhouette, jersey #10 -->
  <g transform="translate(120,55)">
    <circle cx="40" cy="30" r="22" fill="#1A1A1A"/>
    <path d="M10 90 Q40 60 70 90 L75 170 Q40 185 5 170 Z" fill="#00A651"/>
    <text x="40" y="140" font-family="Arial Black, sans-serif" font-size="34" fill="#FFD700" text-anchor="middle">10</text>
    <rect x="0" y="90" width="18" height="55" rx="6" fill="#1A1A1A"/>
    <rect x="62" y="90" width="18" height="55" rx="6" fill="#1A1A1A"/>
  </g>

  <text x="500" y="95" font-family="Arial Black, sans-serif" font-size="46" fill="#FFFFFF">GOKULAN ANBALAGAN</text>
  <text x="500" y="130" font-family="Arial, sans-serif" font-size="20" fill="#FFD700">MERN Stack Developer · UI/UX Designer</text>
  <text x="500" y="160" font-family="Arial, sans-serif" font-size="16" fill="#B8FFC9">Founder, Volt Media · Squad No. 10</text>

  <text x="500" y="200" font-family="Arial, sans-serif" font-size="14" fill="#ffffffaa">🏆 WORLD CUP 2026 · USA · CANADA · MEXICO</text>
